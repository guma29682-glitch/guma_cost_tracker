<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost Tracker</title>
<style>
  :root{
    --paper:#f7f4ec;
    --paper-edge:#e9e4d6;
    --ink:#2b2a27;
    --ink-faint:#6f6b60;
    --rule:#c9c3b2;
    --up:#a13b2e;
    --down:#3a6b4a;
    --flat:#8a8474;
    --accent:#2b2a27;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#dedad0;
    font-family:"Courier New", Courier, monospace;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:40px 16px;
  }
  .receipt{
    width:100%;
    max-width:640px;
    background:var(--paper);
    box-shadow:0 2px 0 var(--paper-edge), 0 18px 40px rgba(0,0,0,0.15);
    padding:36px 32px 48px;
    position:relative;
  }
  .receipt::before, .receipt::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:14px;
    background:
      linear-gradient(135deg, var(--paper) 50%, transparent 50%) 0 0/14px 14px repeat-x,
      linear-gradient(-135deg, var(--paper) 50%, transparent 50%) 0 0/14px 14px repeat-x;
    background-color: #dedad0;
  }
  .receipt::before{ top:-13px; }
  .receipt::after{ bottom:-13px; transform:rotate(180deg); }

  header{ text-align:center; margin-bottom:8px; }
  .brand{
    font-size:22px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    font-weight:700;
  }
  .tagline{
    font-size:11px;
    color:var(--ink-faint);
    letter-spacing:0.08em;
    margin-top:6px;
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--ink-faint);
    margin-top:18px;
    border-top:1px dashed var(--rule);
    border-bottom:1px dashed var(--rule);
    padding:8px 0;
  }

  .items{ margin-top:22px; }
  .item{
    padding:18px 0;
    border-bottom:1px dashed var(--rule);
  }
  .item:last-child{ border-bottom:none; }
  .item-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:12px;
  }
  .item-name{
    font-size:14px;
    font-weight:700;
    line-height:1.3;
  }
  .item-source{
    font-size:10px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-top:2px;
  }
  .item-price{
    font-size:18px;
    font-weight:700;
    white-space:nowrap;
  }
  .item-sub{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
  }
  .delta{
    font-size:11px;
    padding:2px 6px;
    border:1px solid currentColor;
  }
  .delta.up{ color:var(--up); }
  .delta.down{ color:var(--down); }
  .delta.flat{ color:var(--flat); }

  .spark{ display:block; }
  .spark path.line{ fill:none; stroke:var(--ink); stroke-width:1.5; }
  .spark circle{ fill:var(--ink); }

  .history-toggle{
    font-size:10px;
    color:var(--ink-faint);
    text-decoration:underline;
    cursor:pointer;
    margin-top:8px;
    display:inline-block;
  }
  table.history{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
    font-size:11px;
    display:none;
  }
  table.history.open{ display:table; }
  table.history th, table.history td{
    text-align:left;
    padding:3px 4px;
    border-bottom:1px solid var(--paper-edge);
  }
  table.history th{ color:var(--ink-faint); font-weight:normal; }

  footer{
    margin-top:24px;
    border-top:1px dashed var(--rule);
    padding-top:14px;
    text-align:center;
    font-size:10px;
    color:var(--ink-faint);
    letter-spacing:0.05em;
  }
  .barcode{
    margin:14px auto 0;
    height:34px;
    width:70%;
    background:repeating-linear-gradient(90deg, var(--ink) 0 2px, transparent 2px 5px);
    opacity:0.85;
  }

  .empty{
    text-align:center;
    font-size:12px;
    color:var(--ink-faint);
    padding:24px 0;
  }

  @media (max-width:480px){
    .receipt{ padding:28px 18px 40px; }
    .item-name{ font-size:13px; }
    .item-price{ font-size:16px; }
  }
</style>
</head>
<body>
<div class="receipt">
  <header>
    <div class="brand">Cost Tracker</div>
    <div class="tagline">daily price check &middot; various eshops</div>
  </header>
  <div class="meta-row">
    <span id="report-date">— — —</span>
    <span id="item-count">0 items tracked</span>
  </div>

  <div class="items" id="items">
    <div class="empty">Loading today's prices…</div>
  </div>

  <footer>
    <div>generated automatically, every morning</div>
    <div class="barcode"></div>
  </footer>
</div>

<script>
/*
  Data contract:
  - /products.json          → [{ name, source, url, data_file }, ...]
  - /<data_file per item>   → [{ date: "YYYY-MM-DD", price: 229.90 }, ...]  (oldest → newest)

  This page is fully static: the daily task is responsible for updating
  products.json and each data_file, then committing. This file only reads
  and renders — it never needs to change once the data shape is stable.
*/

const CURRENCY = "Kč";

function fmt(n){
  return n.toLocaleString("cs-CZ", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function deltaInfo(curr, prev){
  if(prev === undefined || prev === null) return { label: "new", cls: "flat" };
  const diff = curr - prev;
  if(Math.abs(diff) < 0.005) return { label: "no change", cls: "flat" };
  const pct = (diff / prev) * 100;
  const sign = diff > 0 ? "+" : "−";
  const cls = diff > 0 ? "up" : "down";
  return { label: `${sign}${fmt(Math.abs(diff))} ${CURRENCY} (${sign}${Math.abs(pct).toFixed(1)}%)`, cls };
}

function sparkline(history){
  const w = 90, h = 28, pad = 3;
  if(history.length < 2){
    return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"></svg>`;
  }
  const prices = history.map(p => p.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = (max - min) || 1;
  const step = (w - pad * 2) / (history.length - 1);
  const points = prices.map((p, i) => {
    const x = pad + i * step;
    const y = h - pad - ((p - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const d = points.map((pt, i) => (i === 0 ? "M" : "L") + pt[0].toFixed(1) + "," + pt[1].toFixed(1)).join(" ");
  const last = points[points.length - 1];
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path class="line" d="${d}"></path>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2"></circle>
  </svg>`;
}

function historyTable(history, id){
  const rows = history.slice().reverse().map(p =>
    `<tr><td>${p.date}</td><td>${fmt(p.price)} ${CURRENCY}</td></tr>`
  ).join("");
  return `<span class="history-toggle" onclick="
      var t=document.getElementById('${id}');
      t.classList.toggle('open');
      this.textContent = t.classList.contains('open') ? 'hide history' : 'show history';
    ">show history</span>
    <table class="history" id="${id}">
      <tr><th>date</th><th>price</th></tr>
      ${rows}
    </table>`;
}

async function loadJSON(path){
  const res = await fetch(path, { cache: "no-store" });
  if(!res.ok) throw new Error("failed to load " + path);
  return res.json();
}

async function render(){
  const itemsEl = document.getElementById("items");
  const dateEl = document.getElementById("report-date");
  const countEl = document.getElementById("item-count");

  let products;
  try{
    products = await loadJSON("products.json");
  }catch(e){
    itemsEl.innerHTML = `<div class="empty">Could not load products.json</div>`;
    return;
  }

  if(!products.length){
    itemsEl.innerHTML = `<div class="empty">No products tracked yet</div>`;
    countEl.textContent = "0 items tracked";
    return;
  }

  countEl.textContent = `${products.length} item${products.length === 1 ? "" : "s"} tracked`;

  let latestDate = null;
  const blocks = [];

  for(let i = 0; i < products.length; i++){
    const prod = products[i];
    let history = [];
    try{
      history = await loadJSON(prod.data_file);
    }catch(e){
      blocks.push(`
        <div class="item">
          <div class="item-top">
            <div>
              <div class="item-name">${prod.name}</div>
              <div class="item-source">${prod.source}</div>
            </div>
            <div class="item-price">—</div>
          </div>
          <div class="item-sub"><span class="delta flat">no data yet</span></div>
        </div>`);
      continue;
    }

    const last = history[history.length - 1];
    const prev = history.length > 1 ? history[history.length - 2].price : undefined;
    const delta = deltaInfo(last.price, prev);
    if(!latestDate || last.date > latestDate) latestDate = last.date;

    blocks.push(`
      <div class="item">
        <div class="item-top">
          <div>
            <div class="item-name">${prod.name}</div>
            <div class="item-source">${prod.source}${prod.url ? ` &middot; <a href="${prod.url}" target="_blank" rel="noopener" style="color:inherit;">link</a>` : ""}</div>
          </div>
          <div class="item-price">${fmt(last.price)} ${CURRENCY}</div>
        </div>
        <div class="item-sub">
          <span class="delta ${delta.cls}">${delta.label}</span>
          ${sparkline(history)}
        </div>
        ${historyTable(history, "hist-" + i)}
      </div>`);
  }

  itemsEl.innerHTML = blocks.join("");
  dateEl.textContent = latestDate || "— — —";
}

render();
</script>
</body>
</html>
